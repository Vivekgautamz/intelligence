<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard Template</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!--
        CLIENT DASHBOARD TEMPLATE
        -------------------------
        * Duplicate the entire "intelligence-main" folder and
          rename for each new client.
        * Do not hardcode any client-specific data; use the
          editable fields and controls provided.
        * Remove or replace this comment when sharing with
          clients to avoid exposing template notes.
    -->
    <div class="dashboard">
        <div class="left-panel">
            <div class="client-controls">
                <button id="save-client">Save Client</button>
                <select id="load-client">
                    <option value="">Load Client</option>
                </select>
                <button id="new-client">New Client</button>
            </div>
            <h1>CLIENT: <span contenteditable="true" class="editable client-name-display" data-placeholder="CLIENT NAME">Crimson.com</span></h1>
            <div class="logo-info">
                <div class="logo-section">
                    <span class="label">LOGO UPLOAD</span>
                </div>
                <div id="client-logo" class="logo-placeholder">Logo Placeholder</div>
                <input type="file" id="logo-upload" accept="image/*" style="margin-top: 10px;">
            </div>
            <div class="swatches"></div>

            <section class="brand-colors">
                <h2>Brand Colors</h2>
                <div class="color-item">
                    <label>Primary:</label>
                    <input type="color" value="#007bff" id="primary-color">
                    <span id="primary-code">#007bff</span>
                </div>
                <div class="color-item">
                    <label>Secondary:</label>
                    <input type="color" value="#6c757d" id="secondary-color">
                    <span id="secondary-code">#6c757d</span>
                </div>
                <div class="color-item">
                    <label>Highlight/Accent:</label>
                    <input type="color" value="#ffc107" id="accent-color">
                    <span id="accent-code">#ffc107</span>
                </div>
            </section>

          <section class="client-notes">
<h2>CLIENT NOTES</h2>

<div class="notes-controls">
<button id="edit-notes">Edit</button>
<button id="save-notes">Save</button>
<button id="delete-notes">Delete</button>
</div>

<textarea id="notes-area" disabled></textarea>

</section>

<section class="document-upload">
    <h2>Document Upload</h2>
    <input type="file" id="doc-upload" multiple>
    <div id="uploaded-files"></div>
</section>

            <section class="project-checklist">
                <h2>PRODUCTION CHECKLIST (150 STEPS)</h2>
                <button id="add-checklist-item" style="width:100%;margin-bottom:12px;">Add New Checklist Item</button>
                <div class="checklist-section">
                    <h3>INITIAL SETUP</h3>
                    <ul id="checklist-initial">
                        <li>
                            <label>
                                <input type="checkbox" checked>
                                <span class="checklist-text" contenteditable="false">Install WordPress</span>
                            </label>
                            <button class="checklist-menu">⋮</button>
                            <div class="checklist-dropdown" style="display:none;">
                                <button class="edit-item">Edit</button>
                                <button class="delete-item">Delete</button>
                                <button class="insert-item">Insert Below</button>
                            </div>
                        </li>
                        <li>
                            <label>
                                <input type="checkbox" checked>
                                <span class="checklist-text" contenteditable="false">Choose Theme</span>
                            </label>
                            <button class="checklist-menu">⋮</button>
                            <div class="checklist-dropdown" style="display:none;">
                                <button class="edit-item">Edit</button>
                                <button class="delete-item">Delete</button>
                                <button class="insert-item">Insert Below</button>
                            </div>
                        </li>
                        <li>
                            <label>
                                <input type="checkbox">
                                <span class="checklist-text" contenteditable="false">Choose Theme</span>
                            </label>
                            <button class="checklist-menu">⋮</button>
                            <div class="checklist-dropdown" style="display:none;">
                                <button class="edit-item">Edit</button>
                                <button class="delete-item">Delete</button>
                                <button class="insert-item">Insert Below</button>
                            </div>
                        </li>
                        <li>
                            <label>
                                <input type="checkbox" checked>
                                <span class="checklist-text" contenteditable="false">Customize Header</span>
                            </label>
                            <button class="checklist-menu">⋮</button>
                            <div class="checklist-dropdown" style="display:none;">
                                <button class="edit-item">Edit</button>
                                <button class="delete-item">Delete</button>
                                <button class="insert-item">Insert Below</button>
                            </div>
                        </li>
                        <li>
                            <label>
                                <input type="checkbox" checked>
                                <span class="checklist-text" contenteditable="false">Develop Custom Post Types</span>
                            </label>
                            <button class="checklist-menu">⋮</button>
                            <div class="checklist-dropdown" style="display:none;">
                                <button class="edit-item">Edit</button>
                                <button class="delete-item">Delete</button>
                                <button class="insert-item">Insert Below</button>
                            </div>
                        </li>
                        <li>
                            <label>
                                <input type="checkbox">
                                <span class="checklist-text" contenteditable="false">Implement SEO Plugins</span>
                            </label>
                            <button class="checklist-menu">⋮</button>
                            <div class="checklist-dropdown" style="display:none;">
                                <button class="edit-item">Edit</button>
                                <button class="delete-item">Delete</button>
                                <button class="insert-item">Insert Below</button>
                            </div>
                        </li>
                        <li>
                            <label>
                                <input type="checkbox">
                                <span class="checklist-text" contenteditable="false">Implement SEO Plugins</span>
                            </label>
                            <button class="checklist-menu">⋮</button>
                            <div class="checklist-dropdown" style="display:none;">
                                <button class="edit-item">Edit</button>
                                <button class="delete-item">Delete</button>
                                <button class="insert-item">Insert Below</button>
                            </div>
                    </ul>
                </div>
                <div class="checklist-section">
                    <h3>CONTENT</h3>
                    <ul>
                        <li><label><input type="checkbox">&#160;<span contenteditable="true">Content Migration</span></label></li>
                        <li><label><input type="checkbox">&#160;<span contenteditable="true">Content Migration</span></label></li>
                    </ul>
                </div>
                <div class="checklist-section">
                    <h3>QA & LAUNCH</h3>
                    <ul>
                        <li><label><input type="checkbox" checked>&#160;<span contenteditable="true">QA & Launch</span></label></li>
                    </ul>
                </div>
            </section>
        </div>
        <div class="right-panel">
            <h2>Home Page Preview</h2>
            <div class="preview-controls">
                <input type="text" id="preview-url" placeholder="https://example.com">
                <button id="load-preview">Load</button>
                <span class="preview-info">Enter a URL and click load to preview a site.</span>
            </div>
            <div class="preview-container">
                <iframe src="about:blank" id="website-preview" width="100%" height="600px"></iframe>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
